<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC26 Sage - World Cup 2026 Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-4">
        <header class="flex justify-between items-center py-6 border-b border-zinc-800">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-futbol text-5xl text-emerald-400"></i>
                <div>
                    <h1 class="text-4xl font-bold tracking-tight">WC26 Sage</h1>
                    <p class="text-emerald-400 text-sm">Live Predictions</p>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs uppercase tracking-widest">July 2026</div>
                <div class="text-emerald-500 text-sm">48 Teams • Knockout Stage</div>
            </div>
        </header>

        <div class="my-8">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2"><i class="fa-solid fa-bolt"></i> Today's Best Prognostics</h2>
            <div class="grid md:grid-cols-2 gap-4" id="prognostics-container"></div>
        </div>

        <div>
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-list"></i> Live &amp; Upcoming Matches</h2>
            <div id="matches-container" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const demoMatches = [
            {home: "Brazil", away: "Germany", score: "2-1", conf: "82%", reason: "Superior attack form + H2H edge"},
            {home: "Argentina", away: "France", score: "1-1", conf: "65%", reason: "Tight matchup, draw likely"},
            {home: "Spain", away: "England", score: "2-0", conf: "78%", reason: "Strong midfield control"},
            {home: "USA", away: "Mexico", score: "1-2", conf: "71%", reason: "Home advantage for Mexico"}
        ];

        function renderPrognostics() {
            const container = document.getElementById('prognostics-container');
            container.innerHTML = '';
            demoMatches.forEach(m => {
                const div = document.createElement('div');
                div.className = 'bg-zinc-900 rounded-3xl p-6 border border-zinc-800 hover:border-emerald-500 transition-all';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center text-xl">🇧🇷</div>
                                <span class="font-semibold text-lg">${m.home}</span>
                            </div>
                            <div class="text-center my-4 text-4xl font-mono text-emerald-400">${m.score}</div>
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center text-xl">🇩🇪</div>
                                <span class="font-semibold text-lg">${m.away}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="inline-block bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1 rounded-full font-mono">${m.conf}</div>
                            <div class="mt-6 text-xs text-zinc-400 max-w-[140px]">${m.reason}</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = demoMatches.map(m => `
                <div class="bg-zinc-900 p-5 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <span class="font-medium">${m.home}</span>
                        <span class="text-emerald-400 font-bold">VS</span>
                        <span class="font-medium">${m.away}</span>
                    </div>
                    <div class="text-right">
                        <div class="font-mono text-xl">${m.score}</div>
                        <div class="text-[10px] text-emerald-500">${m.conf} AI</div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            renderPrognostics();
            renderMatches();
            // Try real API
            fetch('https://worldcup26.ir/get/games').then(r => r.json()).then(data => {
                console.log('Real API data:', data);
                // Can extend here
            }).catch(() => console.log('Using demo data'));
        };
    </script>
</body>
</html>
